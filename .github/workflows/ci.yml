name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc

      - name: Configure and build
        run: |
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run tests
        run: ./run_tests.sh

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Rust compiler
        run: cd compiler-rust && cargo build

      - name: Run Rust tests
        run: cd compiler-rust && cargo test

      - name: Build Rust VM
        run: cd vm-rust && cargo build

      - name: Run VM tests
        run: cd vm-rust && cargo test
